name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Buildozer and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev python3-pip cmake g++
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Build APK with Buildozer
      run: |
        # 1. Принимаем лицензии в системном SDK GitHub Actions
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        
        # 2. ХАК ДЛЯ BUILDOZER: Создаем структуру папок внутренних лицензий до запуска
        # Это заставит внутренний SDK сборщика сразу увидеть одобрение лицензий
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/licenses
        
        # Копируем уже подписанные системные лицензии во внутреннюю папку Buildozer
        if [ -d "$ANDROID_HOME/licenses" ]; then
          cp -r $ANDROID_HOME/licenses/* /home/runner/.buildozer/android/platform/android-sdk/licenses/ || true
        fi

        # На всякий случай генерируем хэши стандартных лицензий Google вручную
        echo -e "\n24ab665f47d5a3b2e03b39226044047464d6346c\n84831b9409646a918e30573bab4c9c91346d8abd\n504667f4c0de7af1a06de9f4b1727b84351f2910" > /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

        # Разрешаем предупреждения
        export APP_ALLOW_SDK_WARNINGS=1
        
        # Запускаем сборку
        buildozer android debug
        
