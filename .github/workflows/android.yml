name: Build Android APK

on:
  push:
    branches: [ "main" ] # Запускать сборку каждый раз, когда мы обновляем код
  workflow_dispatch:      # Позволяет запускать сборку вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Get Date
      id: get-date
      run: |
        echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

    # Кэширование сборщика, чтобы в следующие разы собиралось за 2 минуты вместо 15
    - name: Cache Buildozer
      uses: actions/cache@v3
      with:
        path: .buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

    # Установка системных зависимостей Ubuntu
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git python3-dev python3-pip libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-libav libgstrtspserver-1.0-dev gstreamer1.0-rtsp
        pip3 install --user --upgrade buildozer cython virtualenv

    # Сама сборка через официальный экшен Buildozer
    - name: Build with Buildozer
      uses: ArtemGovorov/buildozer-action@v1
      with:
        command: buildozer android debug
        repository_root: .

    # Загрузка готового APK в архив репозитория
    - name: Upload APK artifact
      uses: actions/upload-artifact@v3
      with:
        name: MeltDetector-APK
        path: bin/*.apk
        
